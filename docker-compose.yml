name: sport-local

services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sport-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/wait-for-postgres.sh:/wait-for-postgres.sh
    networks:
      - sport-network
    depends_on:
      - pgsql
      - redis

  nginx:
    image: nginx:alpine
    container_name: sport-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sport-network
    depends_on:
      - app

  pgsql:
    image: postgres:16-alpine
    container_name: sport-pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - sport-network

  redis:
    image: redis:7-alpine
    container_name: sport-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - sport-network

  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sport-queue
    restart: unless-stopped
    working_dir: /var/www
    command: supervisord -c /etc/supervisor/conf.d/supervisord.conf
    user: root
    volumes:
      - ./:/var/www
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    networks:
      - sport-network
    depends_on:
      - pgsql
      - redis

  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: sport-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: /bin/sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./:/var/www
    networks:
      - sport-network
    depends_on:
      - pgsql
      - redis

networks:
  sport-network:
    driver: bridge

volumes:
  pgsql-data:
    driver: local
  redis-data:
    driver: local
